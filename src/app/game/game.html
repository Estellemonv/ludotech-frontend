<mat-form-field appearance="outline" class="search-bar">
  <mat-label>Rechercher un jeu</mat-label>
  <input
    matInput
    (keyup)="applyFilter($event)"
    placeholder="Rechercher"
  >
</mat-form-field>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

  <ng-container matColumnDef="gameName">
    <th mat-header-cell *matHeaderCellDef>Nom du jeu</th>
    <td mat-cell *matCellDef="let game">{{ game.gameName }}</td>
  </ng-container>

  <ng-container matColumnDef="numberOfPlayers">
    <th mat-header-cell *matHeaderCellDef>nb de joueurs</th>
    <td mat-cell *matCellDef="let game">{{ game.numberOfPlayers }}</td>
  </ng-container>

  <ng-container matColumnDef="timeOfGame">
    <th mat-header-cell *matHeaderCellDef>temps de jeux</th>
    <td mat-cell *matCellDef="let game">{{ game.timeOfGame }}</td>
  </ng-container>

  <ng-container matColumnDef="editor">
    <th mat-header-cell *matHeaderCellDef>editor</th>
    <td mat-cell *matCellDef="let game">{{ game.editor }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>status</th>
    <td mat-cell *matCellDef="let game">{{ game.status }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
  <th mat-header-cell *matHeaderCellDef>
    Actions
  </th>

  <td mat-cell *matCellDef="let game">

    <!-- Modifier -->
    <button 
      mat-icon-button
      (click)="editGame(game)"
      aria-label="Modifier">
      <mat-icon>edit</mat-icon>
    </button>

    <!-- Supprimer -->
    <button 
      mat-icon-button
      (click)="deleteGame(game)"
      aria-label="Supprimer">
      <mat-icon>delete</mat-icon>
    </button>

  </td>
</ng-container>
  

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

  <tr class="mat-row" *matNoDataRow>
  <td class="mat-cell" colspan="5">
    Aucun jeu trouvé
  </td>
</tr>

</table>
