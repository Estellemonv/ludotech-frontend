<app-header (toggleMenu)="toggleSidebar()"></app-header>

<mat-sidenav-container class="sidenav-container">

  <!-- SIDEBAR -->
  <mat-sidenav
    #sidenav
    mode="side"
    [opened]="true"
    class="sidenav"
    [class.collapsed]="collapsed">

    <!-- MENU -->
    <mat-nav-list>

      <a mat-list-item [routerLink]="['/']" routerLinkActive="active">
        <mat-icon>home</mat-icon>
        @if (!collapsed){
          <span class="label">Acceuil</span>
        }
      </a>

      <a mat-list-item [routerLink]="['/game']" routerLinkActive="active">
        <mat-icon>sports_esports</mat-icon>
        @if (!collapsed) {
          <span class="label">Jeux</span>
        }
      </a>

      <a mat-list-item [routerLink]="['/book']" routerLinkActive="active">
        <mat-icon>book</mat-icon>
        @if (!collapsed) {
          <span class="label">Livre</span>
        }
      </a>

      <a mat-list-item [routerLink]="['/movie']" routerLinkActive="active">
        <mat-icon>movie</mat-icon>
        @if (!collapsed) {
          <span class="label">Film</span>
        }
      </a>

    </mat-nav-list>

  </mat-sidenav>

  <!-- CONTENT -->
  <mat-sidenav-content>
    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>

</mat-sidenav-container>
